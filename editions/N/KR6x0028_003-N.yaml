body:
  text: 第三品處雙論第一施設分二七九十二處者是眼處耳處鼻處舌處身處色處聲處香處味處所觸處意處法處總說分二八眼是眼處耶眼處是眼耶耳是耳處耶耳處是耳耶鼻是鼻處耶鼻處是鼻耶舌是舌處耶舌處是舌耶身是身處耶身處是身耶色是色處耶色處是色耶聲是聲處耶聲處是聲耶香是香處耶香處是香耶味是味處耶味處是味耶所觸是所觸處耶所觸處是所觸耶意是意處耶意處是意耶法是法處耶法處是法耶二八一非眼是非眼處耶非眼處是非眼耶非耳是非耳處耶非耳處是非耳耶非鼻是非鼻處耶非鼻處是非鼻耶非舌是非舌處耶非舌處是非舌耶非身是非身處耶非身處是非身耶非色是非色處耶非色處是非色耶非聲是非聲處耶非聲處是非聲耶非香是非香處耶非香處是非香耶非味是非味處耶非味處是非味耶非所觸是非所觸處耶非所觸處是非所觸耶非意是非意處耶非意處是非意耶非法是非法處耶非法處是非法耶二八二眼是眼處耶處是耳處耶眼是眼處耶處是鼻處耶眼是眼處耶處是舌處耶乃至處是法處耶耳是耳處耶處是眼處耶耳是耳處耶處是鼻處耶乃至處是法處耶鼻是鼻處耶乃至處是法處耶乃至法是法處耶處是眼處耶法是法處耶處是耳處耶乃至處是意處耶可循序之二八三非眼是非眼處耶非處是非耳處耶非眼是非眼處耶非處是非鼻處耶非眼是非眼處耶非處是非舌處耶乃至非處是非法處耶非耳是非耳處耶非處是非眼處耶非耳是非耳處耶非處是非鼻處耶乃至非處是非法處耶非鼻是非鼻處耶乃至非處是非法處耶乃至非法是非法處耶非處是非眼處耶非法是非法處耶非處是非耳處耶乃至非處是非意處耶可循序之二八四眼是處耶處是眼耶耳是處耶處是耳耶鼻是處耶處是鼻耶舌是處耶處是舌耶身是處耶處是身耶色是處耶處是色耶聲是處耶處是聲耶香是處耶處是香耶味是處耶處是味耶所觸是處耶處是所觸耶意是處耶處是意耶法是處耶處是法耶二八五非眼是非處耶非處是非眼耶非耳是非處耶非處是非耳耶非鼻是非處耶非處是非鼻耶非舌是非處耶非處是非舌耶非身是非處耶非處是非身耶非色是非處耶非處是非色耶非聲是非處耶非處是非聲耶非香是非處耶非處是非香耶非味是非處耶非處是非味耶非所觸是非處耶非處是非所觸耶非意是非處耶非處是非意耶非法是非處耶非處是非法耶二八六眼是處耶處是耳耶乃至眼是處耶處是法耶耳是處耶處是眼耶乃至耳是處耶處是法耶鼻是處耶處是眼耶乃至處是法耶法是處耶處是眼耶法是處耶處是耳耶乃至處是意耶可循序之二八七非眼是非處耶非處是非耳耶乃至非眼是非處耶非處是非法耶非耳是非處耶非處是非眼耶乃至非處是非法耶非鼻是非處耶非處是非眼耶乃至非處是非法耶非法是非處耶非處是非眼耶非法是非處耶非處是非耳耶乃至非處是非意耶可循序之義釋分二八八眼是眼處耶天眼慧眼雖是眼而非眼處眼處者是眼而且是眼處眼處是眼耶然耳是耳處耶天耳愛耳雖是耳而非耳處耳處是耳而且是耳處耳處是耳耶然鼻是鼻處耶然鼻處是鼻耶然舌是舌處耶然舌處是舌耶然身是身處耶除身處之外其餘之身雖是身而非身處身處是身而且是身處身處是身耶然色是色處耶除色處之外其餘之色雖是色而非色處色處是色而且是色處色處是色耶然聲是聲處耶然聲處是聲耶然香是香處耶戒香定香慧香雖是香而非香處香處是香而且是香處香處是香耶然味是味處耶義味法味解脫味雖是味而非味處味處是味而非味處味處是味耶然所觸是所觸處耶然所觸處是所觸耶然意是意處耶然意處是意耶然法是法處耶除法處之外其餘之法雖是法而非法處法處是法而且是法處法處是法耶然二八九非眼是非眼處耶然非眼處是非眼耶天眼慧眼雖是非眼處而是眼除眼與眼處之外其餘是非眼非眼處非耳是非耳處耶然非耳處是非耳耶天耳愛耳雖非耳處而是耳除耳與耳處之外其餘是非耳非耳處非鼻是非鼻處耶然非鼻處是非鼻耶然非舌是非舌處耶然非舌處是非舌耶然非身是非身處耶然非身處是非身耶除身處之外其餘之身雖是非身處而是身除身與身處之外其餘是非身非身處非色是非色處耶然非色處是非色耶除色處之外其餘之色雖非色處而是色除色與色處之外其餘是非色非色處非聲是非聲處耶然非聲處是非聲耶然非香是非香處耶然非香處是非香耶戒香定香慧香雖非香處而是香除香與香處之外其餘是非香非香處非味是非味處耶然非味處是非味耶義味法味解脫味雖非味處而是味除味與味處之外其餘是非味非味處非所觸是非所觸處耶然非所觸處是非所觸耶然非意是非意處耶然非意處是非意耶然非法是非法處耶然非法處是非法耶除法處之外其餘之法雖非法處而是法除法與法處之外其餘是非法非法處二九眼是眼處耶天眼慧眼雖是眼而非眼處眼處是眼而且是眼處處是耳處耶耳處是處而且是耳處其餘之處雖是處而非耳處眼是眼處耶天眼慧眼雖是眼而非眼處眼處是眼而且是眼處處是鼻處耶乃至處是法處耶法處是處而且是法處其餘之處雖是處而非法處耳是乃至鼻是乃至法是法處耶除法處之外其餘之法雖是法而非法處法處是法而且是法處處是眼處耶眼處是處而且是眼處其餘之處雖是處而非眼處法是法處耶除法處之外其餘之法雖是法而非法處法處是法而且是法處處是耳處耶乃至處是意處耶意處是處而且是意處其餘之處雖是處而非意處以一一之句為根本而無謬環結之二九一非眼是非眼處耶然非處是非耳處耶然非眼是非眼處耶然非處是非鼻處耶然乃至非處是非法處耶然非耳是非耳處耶然非處是非眼處耶乃至非處是非法處耶然非鼻是非鼻處耶乃至非法是非法處耶然非處是非眼處耶然非法是非法處耶然非處是非耳耶然乃至非處是意處耶然循環皆言然二九二眼是處耶然處是眼處耶眼處是處而且是眼處其餘之處雖是處而非眼處耳是處耶然乃至鼻舌身色聲香味所觸意法是處耶然處是法處耶法處是處而且是法處其餘之處雖是處而非法處二九三非眼是非處耶除眼之外其餘之處雖非眼而是處除眼與處之外其餘是非眼非處非處是非眼處耶然非耳是非處耶除耳之外乃至除鼻之外乃至除舌之外乃至非處非身是非處耶然非處是非身處耶然非色是非處耶除色之外乃至除聲之外乃至除香之外乃至除味之外乃至除所觸之外乃至非處非意是非處耶除意之外其餘之處雖是非意而是處除意與處之外其餘是非意非處非處是非意處耶然非法是非處耶然非處是非法處耶然二九四眼是處耶然處是耳處耶耳處是處而且是耳處其餘之處雖是處而非耳處眼是處耶然處是鼻處耶乃至處是法處耶法處是處而且是法處其餘之處雖是處而非法處耳是處耶然處是眼處耶乃至非眼處乃至處是法處耶乃至非法處鼻是舌乃至法是處耶然處是眼處耶乃至處是意處耶意處是處而且是意處其餘之處雖是處而非意處可循之二九五非眼是非處耶除眼之外其餘之處雖非眼而是處除眼與處之外其餘是非眼非處非處是非耳處耶然乃至非眼是非處耶除眼之外其餘之處雖非眼而是處除眼與處之外其餘者是非眼非處非處是非鼻處耶乃至非處是非法處耶然非耳是非處耶除耳之外乃至除鼻之外乃至除舌之外乃至非處非身是非處耶然非處是非眼處耶然乃至非處是非法處耶然乃至非法是非處耶然非處是非眼處耶然非法是非處耶然非處是非耳處耶然乃至非處至非意處耶然可循序之第二轉分生分二九六若某人眼處生者其人耳處生耶若有眼無耳而往生時其人眼處雖生而其人耳處非生若有眼有耳而往生時其人眼處生而耳處亦生或又若某人耳處生者其人眼處生耶若有耳無眼而往生時其人耳處雖生而其人眼處非生若有耳有眼而往生時其人耳處生而眼處亦生二九七若某人眼處生者其人鼻處生耶若有眼無鼻而往生時其人眼處雖生而其人鼻處非生若有眼有鼻而往生時其人眼處生而鼻處亦生或又若某人鼻處生者其人眼處生耶若有鼻無眼而往生時其人鼻處雖生而其人眼處非生若有鼻有眼而往生時其人鼻處生而眼處亦生二九八若某人眼處生者其人色處生耶然或又若某人色處生者其人眼處生耶若有色無眼而往生時其人色處雖生而其人眼處非生若有眼而往生時其人色處生而眼處亦生二九九若某人眼處生者其人意處生耶然或又若某人意處生者其人眼處生耶若有心無眼而往生時其人意處雖生而其人眼處非生若有眼而往生時其人意處生而眼處亦生三若某人眼處生者其人法處生耶然或又若某人法處生者其人眼處生耶若無眼而往生時其人法處雖生而其人眼處非生若有眼而往生時其人法處生而眼處亦生三一若某人鼻處生者其人色處生耶然或又若某人色處生者其人鼻處生耶若有色無鼻而往生時其人色處雖生而其人鼻處非生若有鼻而往生時其人色處生而鼻處亦生三二若某人鼻處生者其人意處生耶然或又若某人意處生者其人鼻處生耶若有心無鼻而往生時其人意處雖生而其人鼻處非生若有鼻而往生時其人意處生而鼻處亦生三三若某人鼻處生者其人法處生耶然或又若某人法處生者其人鼻處生耶若無鼻而往生時其人法處雖生而其人鼻處非生若有鼻而往生時其人法處生而鼻處亦生三四若某人色處生者其人意處生耶若無心而往生時其人色處雖生而其人意處非生若有色有心而往生時其人色處生而意處亦生或又若某人意處生者其人色處生耶若無色而往生時其人意處雖生而其人色處非生若有心有色而往生時其人意處生而色處亦生三五若某人色處生者其人法處生耶然或又若某人法處生者其人色處生耶若無色而往生時其人法處雖生而其人色處非生若有色而往生時其人法處生而色處亦生三六若某人意處生者其人法處生耶然或又若某人法處生者其人意處生耶若無心而往生之時其人法處雖生而其人意處非生若有心而往生時其人法處生而意處亦生三七若於某處眼處生者於其處耳處生耶然或又若於某處耳處生者於其處眼處生耶然三八若於某處眼處生者於其處鼻處生耶若於色纏於其處眼處雖生而於其處鼻處非生若於欲纏於其處眼處生而鼻處亦生或又若於某處鼻處生者於其處眼處生耶然三九若於某處眼處生者於其處色處生耶然或又若於某處色處生者於其處眼處生耶若於無想有情有於其處色處雖生而於其處眼處非生若於五蘊有時於其處色處生而眼處亦生三一若於某處眼處生者於其處意處生耶然或又若於某處意處生者於其處眼處生耶若於無色有於其處意處雖生而於其處眼處非生若於五蘊有時於其處意處生而眼處亦生三一一若於某處眼處生者於其處法處生耶然或又若於某處法處生者於其處眼處生耶若於無想有情有及無色有於其處法處雖生而於其處眼處非生若於五蘊有於其處法處生而眼處亦生三一二若於某處鼻處生者於其處色處生耶然或又若於某處色處生者於其處鼻處生耶若於色纏於其處色處者生而於其處鼻處