  text: 雙論歸命彼世尊應供正等覺第一品根雙論總說分一若善法者此悉是善根耶或又若善根者此悉是善法耶若善法者此悉是善根之同根耶或又若善根之同根者此悉是善法耶若善根同根之法者此悉是善根之互根耶或又若善根之互根者此悉是善法耶若善法者此悉是善根根耶或又若善根根者此悉是善法耶若善法者此悉是善根之同根根耶或又若善根之同根根者此悉是善法耶若善根同根根之法者此悉是善根之互根根耶或又若善根之互根根者此悉是善法耶若善法者此悉是有善根耶或又若有善根者此悉是善法耶若善法者此悉是有善根之同根耶或又若有善根之同根者此悉是善法耶若有善根同根之法者此悉是有善根之互根耶或又若有善根之互根者此悉是善法耶若善法者此悉是有善根根耶或又若有善根根者此悉是善法耶若善法者此悉是有善根之同根根耶或又若有善根之同根根者此悉是善法耶若有善根同根根之法者此悉是有善根之互根根耶或又若有善根之互根根者此悉是善法耶二若不善法者此悉是不善根耶或又若不善根者此悉是不善法耶若不善法者此悉是不善根之同根耶或又若不善根之同根者此悉是不善法耶若不善根同根之法者此悉是不善根之互根耶或又若不善根之互根者此悉是不善法耶若不善法者此悉是不善根根耶或又若不善根根者此悉是不善法耶若不善法者此悉是不善根之同根根耶或又若不善根之同根根者此悉是不善法耶若不善根同根根之法者此悉是不善根之互根根耶或又若不善根之互根根者此悉是不善法耶若不善法者此悉是有不善根耶或又若有不善根者此悉是不善法耶若不善法者此悉是有不善根之同根耶或又若有不善根之同根者此悉是不善法耶若有不善根同根之法者此悉是有不善根之互根耶或又若有不善根之互根者此悉是不善法耶若不善法者此悉是有不善根根耶或又若有不善根根者此悉是不善法耶若不善法者此悉是有不善根之同根根耶或又若有不善根之同根根者此悉是不善法耶若有不善根同根根之法者此悉是有不善根之互根根耶或又若有不善根之互根根者此悉是不善法耶三若無記法者此悉是無記根耶或又若無記根者此悉是無記法耶若無記法者此悉是無記根之同根耶或又若無記根之同根者此悉是無記法耶若無記根同根之法者此悉是無記根之互根耶或又若無記根之互根者此悉是無記法耶若無記法者此悉是無記根根耶或又若無記根根者此悉是無記法耶若無記法者此悉是無記根之同根根耶或又若無記根之同根根者此悉是無記法耶若無記根同根根之法者此悉是無記根之互根根耶或又若無記根之互根根者此悉是無記法耶若無記法者此悉是有無記根耶或又若有無記根者此悉是無記法耶若無記法者此悉是有無記根之同根耶或又若有無記根之同根者此悉是無記法耶若有無記根同根之法者此悉是有無記根之互根耶或又若有無記根之互根者此悉是無記法耶若無記法者此悉是有無記根根耶或又若有無記根根者此悉是無記法耶若無記法者此悉是有無記根之同根根耶或又若有無記根之同根根者此悉是無記法耶若有無記根同根根之法者此悉是有無記根之互根根耶或又若有無記根之互根根者此悉是無記法耶四若名法者此悉是名根耶或又若名根者此悉是名法耶若名法者此悉是名根之同根耶或又若名根之同根者此悉是名法耶若名根同根之法者此悉是名根之互根耶或又若名根之互根者此悉是名法耶若名法者此悉是名根根耶或又若名根根者此悉是名法耶若名法者此悉是名根之同根根耶或又若名根之同根根者此悉是名法耶若名根同根根之法者此悉是名根之互根根耶或又若名根之互根根者此悉是名法耶若名法者此悉是有名根耶或又若有名根者此悉是名法耶若名法者此悉是有名根之同根耶或又若有名根之同根者此悉是名法耶若有名根同根之法者此悉是有名根之互根耶或又若有名根之互根者此悉是名法耶若名法者此悉是有名根根耶或又若有名根根者此悉是名法耶若名法者此悉是有名根之同根根耶或又若有名根之同根根者此悉是名法耶若有名根同根根之法者此悉是有名根之互根根耶或又若有名根之互根根者此悉是名法耶五若善法者此悉是善因耶乃至善因緣乃至善出生乃至善發生乃至善等起乃至善食乃至善所緣乃至善緣乃至善集耶乃至成為根因因緣出生發生與等起食所緣緣集義釋分六若善法者此悉是善根耶善根者唯三而已其餘之善法者非善根或又若善根者此悉是善法耶然若善法者此悉是善根之同根耶然或又若善根之同根悉是善法耶善等起之色雖是善根之同根而非善善是善根之同根而且是善若善根同根之法者此悉是善根之互根耶根若同處生之善根者則同根而且是互根其餘善根俱生之法雖是善根之同根但非互根或又若善根之互根者此悉是善法耶然七若善法者此悉是善根根耶唯三善根根而已其餘之善法者非善根根或又若善根根者此悉是善法耶然若善法者此悉是善根之同根根耶然或又若善根之同根根者此悉是善法耶善等起之色雖是善根之同根根而非善善是善根之同根根而且是善若善根同根根之法者此悉是善根之互根根耶根若同處生之善根者則同根根而且是互根根其餘善根俱生之法雖是善根之同根根而非互根根或又若善根之互根根者此悉是善法耶然八若善法者此悉是有善根耶然或又若有善根者此悉是善法耶善等起之色雖有善根而非善善是有善根而且是善若善法者此悉是有善根之同根耶然或又若有善根之同根者此悉是善法耶善等起之色雖有善根之同根而非善善是有善根之同根而且是善若有善根同根之法者此悉是有善根之互根耶根若同處生之善根者有善根而且有互根其餘善根俱生之法雖有善根之同根而非有互根或又若有善根之互根者此悉是善法耶然九若善法者此悉是有善根根耶然或又若有善根根者此悉是善法耶善等起之色雖有善根根但非善善是有善根根而且是善若善法者此悉是有善根之同根根耶然或又若有善根之同根根者此悉是善法耶善等起之色雖有善根之同根根而非善善是有善根之同根根而且是善若有善根同根根之法者此悉是有善根之互根根耶根若同處生之善根者有同根根而且有互根根其餘善根俱生之法雖有善根之同根根而非有互根根或又若有善根之互根根者此悉是善法耶然一若不善法者此悉是不善根耶唯三不善根而已餘之不善法而非不善根或又若不善根者此悉是不善法耶然若不善法者此悉是不善根之同根耶無因之不善即非不善根之同根具因之不善是不善根之同根或又若不善根之同根者此悉是不善法耶不善等起之色雖是不善根之同根而非不善不善是不善根之同根而且是不善若不善根同根之法者此悉是不善根之互根耶根若同處生之不善根則同根而且是互根其餘不善根俱生之法雖是不善根之同根而非互根或又若不善根之互根者此悉是不善法耶然一一若不善法者此悉是不善根根耶唯三不善根根而已其餘之不善法非不善根根或又若不善根根者此悉是不善法耶然若不善法者此悉是不善根之同根根耶無因之不善即非不善根之同根根具因之不善是不善根之同根根或又若不善根之同根根者此悉是不善法耶不善等起之色雖是不善根之同根根非不善不善是不善根之同根根而且為不善若不善根同根根之法者此悉是不善根之互根根耶根若同處生之不善根則同根根而且是互根根其餘不善根俱生之法雖是不善根之同根根而非互根根或又若不善根之互根根者此悉是不善法耶然一二若不善法者此悉是有不善根耶無因之不善即非有不善根具因之不善是有不善根或又若有不善根者此悉是不善法耶不善等起之色雖有不善根而非不善不善即有不善根而且是不善若不善法者此悉是不善根之同根耶無因之不善即非有不善根之同根具因之不善是有不善根之同根或又若有不善根之同根者此悉是不善法耶不善等起之色雖有不善根之同根但非不善不善即有不善根之同根而且是不善若有不善根同根之法者此悉有不善根之互根耶根若同處生之不善根則有同根而且是互根其餘之不善根俱生之法雖有不善根之同根而非有互根或又若有不善根之互根者此悉是不善法耶然一三若不善法者此悉是有不善根根耶無因之不善者即非有不善根根具因之不善是有不善根根或又若有不善根根者此悉是不善法耶不善等起之色雖有不善根根而非不善不善即有不善根根而且是不善若不善法者此悉是有不善根之同根根耶無因之不善即非有不善根之同根根具因之不善是有不善根之同根根或又若有不善根之同根根者此悉是不善法耶不善等起之色雖有不善根之同根根但非不善不善即有不善根之同根根而且是不善若有不善根同根根之法者此悉有不善根之互根根耶根若同處生之不善根則有同根根而且有互根根其餘之不善根具生之法雖有不善根之同根根而非有互根根或又若有不善根之互根根者此悉是不善法耶然一四若無記法者此悉是無記根耶唯三無記根而已其餘之無記法非無記根或又若無記根者此悉是無記法耶然若無記法者此悉是無記根之同根耶無因之無記即非無記根之同根具因之無記是無記根之同根或又若無記根之同根者此悉是無記法耶然若無記根同根之法者此悉是無記根之互根耶根若同處生之無記根則同根而且是互根其餘之無記根俱生之法雖是無記根之同根而非互根或又若無記根之互根者此悉是無記法耶然一五若無記法者此悉是無記根根耶唯三無記根根而已餘之無記法非無記根根或又若無記根根者此悉是無記法耶然若無記法者此悉是無記根之同根根耶無因之無記即非無記根之同根根具因之無記是無記根之同根根或又若無記根之同根根者此悉是無記法耶然若無記根同根根之法者此悉是無記根之互根根耶根若同處生之無記根則同根根而且是互根根其餘之無記根俱生之法雖無記根之同根根而非互根根或又若無記根之互根根者此悉是無記法耶然一六若無記法者此悉有無記根耶無因之無記即非有無記根具因之無記是有無記根或又若有無記根者此悉是無記法耶然若無記法者此悉有無記根之同根耶無因之無記即非有無記根之同根具因之無記是有無記根之同根或又若有無記根之同根者此悉是無記法耶然若有無記根同根之法者此悉有無記根之互根耶根若同處生之無記根則有同根而且有互根其餘之無記根俱生之法雖有無記根之同根而非有互根或又若有無記根之互根者此悉是無記法耶然一七若無記法者此悉有無記根根耶無因之無記是非有無記根根具因之無記是有無記根根或又若有無記根根者此悉是無記法耶然若無記法者此悉有無記根之同根根耶無因之無記是非有無記根之同根根具因之無記是有無記根之同根根或又若有無記根之同根根者此悉是無記法耶然若有無記根同根根之法者此悉有無記根之互根根耶根若同處生之無記根者有同根根而且有互根根其餘之無記根俱生之法雖有無記根之同根根而非有互根根或又若有無記根之互根根者此悉是無記法耶然一八若名法者此悉是名根耶名根是唯九而已餘之名法非是名根或又若名根者此悉是名法耶然若名法者此悉是名根之同根耶無因之名非是名根之同根具因之名是名根之同根或又若名根之同根者此悉名為法耶名等起之色雖是名根之同根而非名名是名根之同根而且是名若名根同根之法者此悉是名根之互根耶若根同處生之名根者是同根而且是互根其餘之名根俱生之法雖是名根之同根但非互根或又若名根之互根者此悉是名法耶然一九若名法者此悉是名根根耶名根根是唯九而已其餘之名法非是名根或又若名根根者此悉是名法耶然若名法者此悉是名根之同根根耶無因之名非是名根之同根根具因之名是名根之同根根或又若名根之同根根者此悉是名法耶名等起之色雖是名根之同根根而非名名是名根之同根根而且是名若名根同根根之法者此悉是名根之互根根耶若根同處生之名根者是同根根而且是互根根其餘之名根俱生之法雖是名根之同根根而非互根根或又若名根之互根根者此悉是名法耶然二若名法者此悉是有名根耶無因之名非是有名根具因之名是有名根或又若有名根者此悉是名法耶名等起之色雖有名根而非名名是有名根而且是名若名法者此悉有名根之同根耶無因之名非是有名根之同根具因之名是有名根之同根或又若有名根之同根者此悉是名法耶名等起之色雖有名根之同根而非名名是有名根之同根而且是名若有名根同根之法者此悉是有名根之互根耶若根同處生之名根是有同根而且有互根其餘之名根俱生之法雖有名根之同根而非有互根或又若有名根之互根者此悉是名法耶然二一若名法者此悉有名根根耶無因之名非是有名根根具因之名是有名根根或又若有名根根者此悉是名法耶名等起之色雖有名根根而非名名是有名根根而且是名若名法者此悉有名根之同根根耶無因之名非是有名根之同根根具因之名是有名根之同根根或又若有名根之同根根者此悉是名法耶名等起之色雖有名根之同根根而非名名是有名根之同根根而且是名若有名根同根根之法者此悉有名根之互根根耶若根同處生之名根是有同根根而且有互根根其餘之名根俱生之法雖有名根之同根根而非有互根根或又若有名根之互根根者此悉是名法耶然二二若善法者此悉是善因耶善因緣善出生善發生善等起善食善所緣善緣善集耶若不善法者若無記法者若名法者此悉是名因耶名因緣名出生名發生名等起名食名所緣名緣名集耶乃至根因因緣出生發生與等起食所緣緣集
