body:
  text: 第二品蘊雙論第一施設分二三五蘊者是色蘊受蘊想蘊行蘊識蘊總説分二四色是色蘊耶色蘊是色耶受是受蘊耶受蘊是受耶想是想蘊耶想蘊是想耶行是行蘊耶行蘊是行耶識是識蘊耶識蘊是識耶二五非色非是色蘊耶非色蘊非是色耶非受是乃至非想乃至非行乃至非識非是識蘊耶非識蘊非是識耶二六色是色蘊耶蘊是受蘊耶色是色蘊耶蘊是想蘊耶色是色蘊耶蘊是行蘊耶色是色蘊耶蘊是識蘊耶受是受蘊耶蘊是色蘊耶乃至蘊是識蘊耶想是想蘊耶蘊是色蘊耶乃至蘊是識蘊耶行是行蘊耶蘊是色蘊耶乃至蘊是識蘊耶識是識蘊耶蘊是色蘊耶識是識蘊耶蘊是受蘊耶識是識蘊耶蘊是想蘊耶識是識蘊耶蘊是行蘊耶二七非色是非色蘊耶非蘊是非受蘊耶非色是非色蘊耶非蘊是非想蘊耶非色是非色蘊耶非蘊是非行蘊耶非色是非色蘊耶非蘊是非識蘊耶非受是非受蘊耶非蘊是非色蘊耶乃至非蘊是非識蘊耶非想是非想蘊耶非蘊是非色蘊耶乃至非蘊是非識蘊耶非行是非行蘊耶非蘊是非色蘊耶乃至非蘊是非識蘊耶非識是非識蘊耶非蘊是非色蘊耶非識是非識蘊耶非蘊是非受蘊耶非識是非識蘊耶非蘊是非想蘊耶非識是非識蘊耶非蘊是非行蘊耶二八色是蘊耶蘊是色耶受是蘊耶蘊是受耶想是蘊耶蘊是想耶行是蘊耶蘊是行耶識是蘊耶蘊是識耶二九非色是非蘊耶非蘊是非色耶非受是非蘊耶非蘊是非受耶非想是非蘊耶非蘊是非想耶非行是非蘊耶非蘊是非行耶非識是非蘊耶非蘊是非識耶三色是蘊耶蘊是受耶色是蘊耶蘊是想耶色是蘊耶蘊是行耶色是蘊耶蘊是識耶受是蘊耶蘊是色耶受是蘊耶蘊是想耶受是蘊耶蘊是行耶受是蘊耶蘊是識耶想是蘊耶蘊是色耶想是蘊耶蘊是受耶想是蘊耶蘊是行耶想是蘊耶蘊是識耶行是蘊耶蘊是色耶行是蘊耶蘊是受耶行是蘊耶蘊是想耶行是蘊耶蘊是識耶識是蘊耶蘊是色耶識是蘊耶蘊是受耶識是蘊耶蘊是想耶識是蘊耶蘊是行耶三一非色是非蘊耶非蘊是非受耶非色是非蘊耶非蘊是非想耶非色是非蘊耶非蘊是非行耶非色是非蘊耶非蘊是非識耶非受是非蘊耶非蘊是非色耶非受是非蘊耶非蘊是非想耶非受是非蘊耶非蘊是非行耶非受是非蘊耶非蘊是非識耶非想是非蘊耶非蘊是非色耶非想是非蘊耶非蘊是非受耶非想是非蘊耶非蘊是非行耶非想是非蘊耶非蘊是非識耶非行是非蘊耶非蘊是非色耶非行是非蘊耶非蘊是非受耶非行是非蘊耶非蘊是非想耶非行是非蘊耶非蘊是非識耶非識是非蘊耶非蘊是非色耶非識是非蘊耶非蘊是非受耶非識是非蘊耶非蘊是非想耶非識是非蘊耶非蘊是非行耶義釋分三二色是色蘊耶喜色悅色雖是色而非色蘊色蘊是色而且是色蘊色蘊是色耶然三三受是受蘊耶然受蘊是受耶然三四想是想蘊耶見想雖是想而非想蘊想蘊是想而且是想蘊想蘊是想耶然三五行是行蘊耶除行蘊之外其餘之行雖是行而非行蘊行蘊是行而且是行蘊行蘊是行耶然三六識是識蘊耶然識蘊是識耶然三七非色是非色蘊耶然非色蘊是非色耶喜色悅色雖是非色蘊而是想除色色蘊之外其餘是非色非色蘊三八非受是非受蘊耶然非受蘊是非受耶然三九非想是非想蘊耶然非想蘊是非想耶見想雖是非想蘊而是想除想想蘊之外其餘是非想非想蘊四非行是非行蘊耶然非行蘊是非行耶除行蘊之外其餘之行雖是非行蘊而是行除行行蘊之外其餘是非行非行蘊四一非識是非識蘊耶然非識蘊是非識耶然四二色是色蘊耶喜色悅色雖是色而非色蘊色蘊是色而且是色蘊蘊是受蘊耶受蘊是蘊而且是受蘊其餘之蘊雖是蘊而非受蘊四三色是色蘊耶喜色悅色乃至是色蘊蘊是想蘊耶想蘊是蘊而且是想蘊其餘之蘊雖是蘊而非想蘊四四色是色蘊耶喜色悅色乃至是色蘊蘊是行蘊耶行蘊是蘊而且是行蘊其餘之蘊雖是蘊而非行蘊四五色是色蘊耶喜色悅色者乃至是色蘊蘊是識蘊耶識蘊是蘊而且是識蘊其餘之蘊雖是蘊而非識蘊四六受是受蘊耶然蘊是色蘊耶色蘊是蘊而且是色蘊其餘之蘊雖是蘊而非色蘊四七受是受蘊耶然蘊是想蘊耶想蘊是乃至非想蘊四八受是受蘊耶然蘊是行蘊耶行蘊是乃至非行蘊四九受是受蘊耶然蘊是識蘊耶識蘊是乃至非識蘊五想是想蘊耶見想雖是想而非想蘊想蘊是想而且是想蘊蘊是色蘊耶色蘊是蘊而且是色蘊其餘之蘊雖是蘊而非色蘊五一想是想蘊耶見想乃至想蘊蘊是受蘊耶受蘊者乃至非受蘊五二想是想蘊耶見想乃至想蘊蘊是行蘊耶行蘊乃至非行蘊五三想是想蘊耶見想乃至想蘊蘊是識蘊耶識蘊乃至非識蘊五四行是行蘊耶除行蘊之外其餘之行雖是行而非行蘊行蘊是行而且是行蘊蘊是色蘊耶色蘊乃至非色蘊五五行是行蘊耶除行蘊之外乃至行蘊蘊是受蘊耶受蘊者乃至非受蘊五六行是行蘊耶除行蘊之外乃至行蘊蘊是想蘊耶想蘊乃至非想蘊五七行是行蘊耶除行蘊之外乃至行蘊蘊是識蘊耶識蘊乃至非識蘊五八識是識蘊耶然蘊是色蘊耶色蘊是乃至非色蘊五九識是識蘊耶然蘊是受蘊耶受蘊是乃至非受蘊六識是識蘊耶然蘊是想蘊耶想蘊是乃至非想蘊六一識是識蘊耶然蘊是行蘊耶行蘊是乃至非行蘊六二非色是非色蘊耶然非蘊是非受蘊耶然非色是非色蘊耶然非蘊是非想蘊耶然非色是非色蘊耶然非蘊是非行蘊耶然非色是非色蘊耶然非蘊是非識蘊耶然六三非受是非受蘊耶然非蘊是非色蘊耶然乃至非蘊是非識蘊耶然六四非想是非想蘊耶然非蘊是非色蘊耶然乃至非蘊是非識蘊耶然六五非行是非行蘊耶然非蘊是