body:
  text: 第四品界雙論第一施設分七九四十八界者是眼界耳界鼻界舌界身界色界聲界香界味界所觸界眼識界耳識界鼻識界舌識界身識界意界意識界法界也總說分七九五眼是眼界耶眼界是眼耶耳是耳界耶耳界是耳耶乃至眼識是眼識界耶眼識界是眼識耶乃至意是意界耶意界是意耶意識是意識界耶意識界是意識耶法是法界耶法界是法耶七九六非眼是非眼界耶非眼界是非眼耶非耳界是非耳耶乃至非眼識是非眼識界耶非眼識界是非眼識耶乃至非意是非意界耶非意界是非意耶非意識是非意識界耶非意識界是非意識耶非法是非法界耶非法界是非法耶七九七眼是眼界耶界是耳界耶乃至眼是眼界耶界是法界耶如於處雙論之循序如是此處亦可循序之七九八非眼是非眼界耶非界是非耳界耶非眼是非眼界耶非界是非鼻界耶乃至非眼是非眼界耶非界是非法界耶乃至非法是非法界耶非界是非眼界耶乃至非法是非法界耶非界是非意識界耶可循序之七九九眼是界耶界是眼耶耳是界耶界是耳耶鼻舌身色聲香味所觸耶眼識是界耶界是眼識耶耳識是界耶界是耳識耶鼻識舌識身識耶意即是界耶界是意耶意識是界耶界是意識耶法是界耶界是法耶八非眼是非界耶非界是非眼耶非耳是非界耶非界是非耳耶非鼻非舌非身非色非聲非香非味非所觸耶非眼識是非界耶非界是非眼識耶非耳識非鼻識非舌識耶非身識是非界耶非界是非身識耶非意是非界耶非界是非意耶非意識是非界耶非界是非意識耶非法是非界耶非界是非法耶八一眼是界耶界是耳耶乃至眼即界耶界是法耶乃至法是界耶界是眼耶乃至法是界耶界是意識耶可循序之八二非眼是非界耶非界是非耳耶非眼是非界耶非界是非鼻耶乃至非眼是非界耶非界是非法耶乃至非法是非界耶非界是非眼耶乃至非法是非界耶非界是非意識耶可循序之義釋分八三眼是眼界耶天眼慧眼雖是眼而非眼界眼界是眼而且是眼界眼界是眼耶然耳是耳界耶天耳愛耳雖是耳然而非耳界耳界是耳而且是耳界耳界是耳耶然鼻是鼻界耶然鼻界是鼻耶然舌亦同鼻界身是身界耶除身界外其餘之身雖是身而非身界身界是身而且是身界身界是身耶然色是色界耶除色界之外其餘之色雖是色而非色界色界是色而且是色界色界是色耶然聲亦同於鼻香是香界耶戒香定香慧香雖是香而非香界香界是香而且是香界香界是香耶然味是味界耶義味法味解脫味雖是味而非味界味界是味而且是味界味界是味耶然所觸亦同於鼻眼識是眼識界耶然眼識界是眼識耶然耳識乃至鼻識舌識身識意是意界耶除意界之外其餘之意雖是意而非意界意界是意而且是意界意界是意耶然意識是意識界耶然意識界是意識耶然法是法界耶除法界之外其餘之法雖是法而非法界法界是法而且是法界法界是法耶然八四非眼是非眼界耶然非眼界是非眼耶天眼慧眼雖是非眼界而是眼除眼與眼界之外其餘是非眼非眼界非耳是非耳界耶然非耳界是非耳耶天耳愛耳雖是非耳界而是耳除耳與耳界之外其餘是非耳非耳界非鼻是非鼻界耶然非鼻界是鼻耶然以下所省略處是兩者皆然非舌是乃至非身是非身界耶然非身界是非身耶除身界之外其餘之身雖是非身界而是身除身與身界之外其餘是非身非身界非色是非色界耶然非色界是非色耶除色界之外其餘之色雖是非色界而是色除色與色界之外其餘是非色非色界非聲是乃至非香是非香界耶然非香界是非香耶戒香定香慧香雖是非香界而是香除香與香界之外其餘是非香非香界非味是非味界耶然非味界是非味耶義味法味解脫味雖是非味界而是味除味與味界之外其餘是非味非味界非所觸是乃至非眼識是非眼識界耶然非眼識界是非眼識耶然非耳識非鼻識非舌識非身識非意是非意界耶然非意界是非意耶除意界之外其餘之意雖是非意界而是意除意與意界之外其餘是非意非意界非意識是非意識界耶然非意識界是非意識耶然非法是非法界耶然非法界是非法耶除法界之外其餘之法雖是法界而是法除法與法界之外其餘是非法非法界八五眼是眼界耶天眼慧眼雖是眼而非眼界眼界是眼而且是眼界界是耳界耶耳界是界而且是耳界其餘之界雖是界而非耳界眼是眼界耶天眼慧眼雖是眼而非眼界眼界是眼而且是眼界界是鼻界耶乃至界是鼻界耶乃至界是法界耶法界有是界而且是法界其餘之界雖是界而非法界如處雙論之施設分界雙論亦有施設分可循序之八六非眼是非眼界耶然非界是非耳界耶然非眼是非眼界耶然非界是非鼻界耶乃至非界是非法界耶然可循序之其餘之一切兩者皆然八七眼是界耶然界是眼界耶眼界是界而且是眼界其餘之界雖是界而非眼界耳是界耶然乃至鼻舌身色聲香味所觸眼識是界耶然界是眼識界耶眼識界是界而且是眼識界其餘之界雖是界而非眼識界耳識鼻識舌識身識意是界耶然界是意界耶意界是界而且是意界其餘之界雖是界然非意界意識是界耶然界是意識界耶意識界是界而且是意識界其餘之界雖是界而非意識界法是界耶然界是法界耶法界是界而且是法界其餘之界雖是界而非法界八八非眼是非界耶除眼之外其餘之界雖是非眼而是界除眼與界之外其餘是非眼非界非界是非眼界耶然非耳是非界耶然除耳乃至除鼻除舌乃至非身是非界耶然非界是非身界耶然非色是非界耶除色乃至除聲香味所觸眼識耳識鼻識舌識身識意除意識乃至非法是非界耶然非界是非法界耶然八九眼是界耶然界是耳界耶耳界是界而且是耳界其餘之界雖是界而非耳界眼是界耶然界是鼻界耶乃至界是法界耶法界是界而且是法界其餘之界雖是界而非法界可循序之八一非眼是非界耶除眼之外其餘之界雖是非眼而是界除眼與界之外其餘是非眼非界非界是非耳界耶然非眼是非界耶除眼之外其餘之界雖是非眼而是界除眼與界之外其餘是非眼非界非界是非鼻界耶乃至非界是非法界耶然乃至非法是非界耶然非界是非眼界耶然非法是非界耶然非界是非耳界耶乃至非界是非意識界耶然可循序之如處雙論之施設分界雙論之施設分亦可廣說第二轉分八一一若某人眼界生者其人耳界生耶若有眼無耳而往生時其人眼界雖生而其人耳界非生若有眼有耳而往生時其人眼界生而耳界亦生或又若某人耳界生者其人眼界生耶若有耳無眼而往生時其人耳界雖生而其人眼界非生若有耳有眼而往生時其人耳界生而眼界亦生八一二若某人眼界生者其人之鼻界生耶若有眼無鼻而往生時其人眼界雖生而其人鼻界非生若有眼有鼻而往生時其人眼界生而鼻界亦生或又若某人鼻界生者其人眼界生耶若有鼻無眼而往生時其人鼻界雖生而其人眼界非生若有鼻有眼而往生時其人鼻界生而眼界亦生八一三若某人眼界生者其人色界生耶然或又若某人色界生者其人眼界生耶若有色無眼而往生時其人色界生而其人眼界非生若有色有眼而往生時其人色界生而眼界亦生八一四若某人眼界生者其人意識界生耶然或又若某人意識界生者其人眼界生耶若有心無眼而往生時其人意識界雖生而其人眼界非生若有心有眼而往生時其人意識界生而眼界亦生八一五若某人眼界生者其人法界生耶然或又若某人法界生者其人眼界生耶若無眼而往生時其人法界生而其人之眼界非生若有眼而往生時其人法界生而眼界亦生如處雙論而分別如是界雙論亦分別而相同之答案第三遍知分八一六遍知者眼處是遍知耳處耶然乃至如圓滿界雙論之例也
