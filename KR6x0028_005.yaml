body:
  text: 第五品諦雙論第一施設分四諦者是苦諦集諦滅諦道諦也總說分八一七苦是苦諦耶苦諦是苦耶集是集諦耶集諦是集耶滅是滅諦耶滅諦是滅耶道是道諦耶道諦是道耶八一八非苦是非苦諦耶非苦諦是非苦耶非集是非集諦耶非集諦是非集耶非滅是非滅諦耶非滅諦是非滅耶非道是非道諦耶非道諦是非道耶八一九苦是苦諦耶諦是集諦耶苦是苦諦耶諦是滅諦耶苦是苦諦耶諦是道諦耶集是集諦耶諦是苦諦耶集是集諦耶諦是滅諦耶集是集諦耶諦是道諦耶滅是滅諦耶諦是苦諦耶滅是滅諦耶諦是集諦耶滅是滅諦耶諦是道諦耶道是道諦耶諦是苦諦耶道是道諦耶諦是集諦耶道是道諦耶諦是滅諦耶八二非苦是非苦諦耶非諦是非集諦耶非苦是非苦諦耶非諦是非滅諦耶非苦是非苦諦耶非諦是非道諦耶非集是非集諦耶非諦是非苦諦耶非集是非集諦耶非諦是非滅諦耶非集是非集諦耶非諦是非道諦耶非滅是非滅諦耶非諦是非苦諦耶非滅是非滅諦耶非諦是非集諦耶非滅是非滅諦耶非諦是非道諦耶非道是非道諦耶非諦是非苦諦耶非道是非道諦耶非諦是非集諦耶非道是非道諦耶非諦是非滅諦耶八二一苦是諦耶諦是苦耶集是諦耶諦是集耶滅是諦耶諦是滅耶道是諦耶諦是道耶八二二非苦是非諦耶非諦是非苦耶非集是非諦耶非諦是非集耶非滅是非諦耶非諦是非滅耶非道是非諦耶非諦是非道耶八二三苦是諦耶諦是集耶苦是諦耶諦是滅耶苦是諦耶諦是道耶集是諦耶諦乃是苦耶乃至諦是道耶滅是諦耶諦是苦耶乃至諦是道耶道是諦耶諦是苦耶道是諦耶諦是集耶道是諦耶諦是滅耶八二四非苦是非諦耶非諦是非集耶非苦是非諦耶非諦是非滅耶非苦是非諦耶非諦是非道耶非集是非諦耶非諦是非苦耶乃至非諦是非道耶非滅是非諦耶非諦是非苦耶乃至非諦是非道耶非道是非諦耶非諦是非苦耶非道是非諦耶非諦是非集耶非道是非諦耶非諦乃是非滅耶義釋分八二五苦是苦諦耶然苦諦是苦耶除身苦心苦之外其餘之苦諦雖是苦諦而非苦身苦心苦是苦而且是苦諦集是集諦耶除集諦之外其餘之集雖是集而非集諦集諦是集而且是集諦集諦是集耶然滅是滅諦耶除滅諦之外其餘之滅雖是滅而非滅諦滅諦是滅而且是滅諦滅諦是滅耶然道是道諦耶除道諦之外其餘之道雖是道而非道諦道諦是道而且是道諦道諦是道耶然八二六非苦是非苦諦耶除身苦心苦之外其餘之苦諦雖是非苦而是苦諦除苦與苦諦之外其餘是非苦非苦諦非苦諦是非苦耶然非集是非集諦耶然非集諦是非集耶除集諦之外其餘之集雖是非集諦而是集除集與集諦之外其餘是非集非集諦非滅是非滅諦耶然非滅諦是非滅耶除滅諦之外其餘之滅雖是非滅諦而是滅除滅與滅諦之外其餘是非滅非滅諦非道是非道諦耶然非道諦是非道耶除道諦之外其餘之道雖是非道諦而是道除道與道諦之外其餘是非道非道諦八二七苦是苦諦耶然諦是集諦耶集諦是諦而且是集諦其餘之諦雖是諦而非集諦苦是苦諦耶然諦是滅諦耶乃至諦是道諦耶道諦是諦而且是道諦其餘之諦雖是諦而非道諦集是集諦耶除集諦之外其餘之集雖是集而非集諦集諦是集而且是集諦諦是苦諦耶乃至諦是滅諦耶乃至諦是道諦耶道諦是道而且是道諦其餘之諦雖是諦而非道諦滅是滅諦耶除滅諦之外其餘之滅雖是滅而非滅諦滅諦是滅而且是滅諦諦是苦諦耶乃至諦是集諦耶乃至諦是道諦耶道諦是諦而且是道諦其餘之諦雖是諦而非道諦道是道諦耶除道諦之外其餘之諦雖是諦而非道諦道諦是道而且是道諦諦是苦諦耶乃至諦是集諦耶乃至諦是滅諦耶滅諦是諦而且是滅諦其餘諦者雖是諦而非滅諦八二八非苦是非苦諦耶除身苦心苦之外其餘之苦諦雖是非苦而是苦諦除苦與苦諦之外其餘是非苦非苦諦非諦是非集諦耶然非苦是非苦諦耶除身苦心苦之外其餘之苦諦雖是非苦而是苦諦除苦與苦諦之外其餘是非苦非苦諦非諦是非滅諦耶乃至非諦是非道諦耶然然非集是非集諦耶然非諦是非苦諦耶然非集是非集諦耶然非諦是非滅諦耶乃至非諦是非道諦耶然非滅是非滅諦耶然非諦是非苦諦耶乃至非諦是非集諦耶乃至非諦是非道諦耶然非道是非道諦耶然非諦是非苦諦耶然非道是非道諦耶然非諦是非集諦耶乃至非諦是非滅諦耶然八二九苦是諦耶然諦是苦諦耶苦諦是諦而且是苦諦其餘之諦雖是諦然非苦諦集是諦耶然乃至滅是諦耶然乃至道是諦耶然諦是道諦耶道諦是諦而且是道諦其餘之諦雖是諦而非道諦八三非苦是非諦耶除苦之外其餘之諦雖是非苦而是諦除苦與諦之外其餘是非苦非諦非諦是非苦諦耶然非集是非諦耶除集乃至非滅是非諦耶除滅乃至非道是非諦耶除道之外其餘之諦雖是非道而是諦除道與諦之外其餘是非道非諦非諦是非道諦耶然八三一苦是諦耶然諦是集諦耶集諦是諦而且是集諦其餘之諦雖是諦而非集諦苦是諦耶然諦是滅耶乃至諦是道諦耶道諦是諦而且是道諦其餘之諦雖是諦而非道諦集是諦耶然乃至滅是諦耶然乃至道是諦耶然諦是苦諦耶乃至諦是集諦耶乃至諦是滅諦耶滅諦是諦而且是滅諦其餘之諦雖是諦而非滅諦八三二非苦是非諦耶除苦之外其餘之諦雖是非苦而是諦除苦與諦之外其餘是非苦非諦非諦是非集諦耶然非苦是非諦耶除苦之外其餘之諦雖是非苦而是諦除苦與諦之外其餘是非苦非諦非諦是非滅諦耶乃至非諦是非道諦耶然非集是非諦耶除集之外其餘之諦雖是非集而是諦除集與諦之外其餘是非集非諦乃至非滅是非諦耶除滅乃至非道是非諦耶除道之外其餘之諦雖是非道而是諦除道與諦之外其餘是非道非諦非諦是非集諦耶乃至非諦是非滅諦耶然第二轉分生分八三三若某人苦諦生者其人集諦生耶凡於往生所轉而渴愛不相應之心生時其人苦諦雖生而其人集諦非生若渴愛生時其人苦諦生而集諦亦生或又若某人集諦生者其人苦諦生耶然八三四若某人苦諦生者其人道諦生耶凡於往生所轉而道不相應之心生時其人苦諦雖生而其人之道諦非生若於五蘊有道生時其人苦諦生而道諦亦生或又若某人道諦生者其人苦諦生耶若於無色有而道生時其人道諦雖生而其人苦諦非生若於五蘊有而道生時其人道諦生而苦諦亦生八三五若某人集諦生者其人道諦生耶不然或又若某人道諦生者其人集諦生耶不然八三六若於某處苦諦生者於其處集諦生耶若於無想有情有者於其處苦諦雖生而於其處集諦非生若於四蘊有五蘊有者於其處苦諦生而集諦亦生或又若於某處集諦生者於其處苦諦生耶然八三七若於某處苦諦生者於其處道諦生耶若於惡生或無想有情有者於其處苦諦雖生而於其處道諦非生其餘四蘊有五蘊有者於其處苦諦生而道諦亦生或又若於某處道諦生者於其處苦諦生耶然八三八若於某處集諦生者於其處道諦生耶若於惡生者於其處集諦雖生而於其處道諦非生其餘之四蘊有五蘊有者於其處集諦生而道諦亦生或又若於某處道諦生者於其處之集諦生耶然八三九若某人於某處苦諦生者其人於其處集諦生耶若某人云云或若某人於某處云云同應廣說八四若某人苦諦不生者其人集諦不生耶然或又若某人集諦不生者其人苦諦不生耶凡於往生所轉而渴愛不相應心生時其人集諦雖不生而其人苦諦非不生凡於死沒所轉而心滅時或於無色有而道果生時其人集諦不生而苦諦亦不生八四一若某人苦諦不生者其人道諦不生耶若於無色有而道生時其人苦諦雖不生而其人道諦非不生凡於死沒所轉而心滅時或於無色有而果生時其人苦諦不生而道諦亦不生或又若某人道諦不生者其人苦諦不生耶凡往生於所轉而道不相應之心生時其人道諦雖不生而其人苦諦非不生凡於死沒所轉而心滅之時或於無色有而果生時其人道諦不生而苦諦亦不生八四二若某人集諦不生者其人道諦不生耶若道生時其人集諦雖不生而其人道諦非不生凡心滅時或渴愛不相應道不相應之心生時或入於滅盡定或無想有情者其人集諦不生而道諦亦不生或又若某人道諦不生者其人集諦不生耶若渴愛生時其人道諦雖不生而其人集諦非不生凡心滅時或道不相應渴愛不相應心生時或入於滅盡定或無想有情者其人道諦不生而集諦亦不生八四三若於某處苦諦不生者於其處集諦不生耶無有如是處或又若於某處集諦不生者於其處苦諦不生耶生八四四若於某處苦諦不生者於其處道諦不生耶無有如是處或又若於某處道諦不生者於其處苦諦不生耶生八四五若於某處集諦不生者於其處道諦不生耶然或又若於某處道諦不生者於其處集諦不生耶若於惡生者於其處道諦雖不生而於其處集諦非不生若於無想有情有者於其處道諦不生而集諦亦不生八四六若某人於某處苦諦不生者其人於其處集諦不生耶然或又若某人於某處集諦不生者其人於其處苦諦不生耶凡於往生所轉而渴愛不相應心生時其人於其處集諦雖不生而其人於其處苦諦非不生凡於死沒所轉而心滅時或於無色有而道果生時其人於其處集諦不生而苦諦亦不生八四七若某人於某處苦諦不生者其人於其處道諦不生耶若於無色有而道生時其人於其處苦諦雖不生而其人於其處道諦非不生凡於死沒所轉而心滅時或於無色有而果生時其人於其處苦諦不生而道諦亦不生或又若某人於某處道諦不生者其人於其處苦諦不生耶凡往生於所轉而道不相應之心生時其人於其處道諦雖不生而其人於其處苦諦非不生凡於死沒所轉而心滅時或於無色有而果生時其人於其處道諦不生而苦諦亦不生八四八若某人於某處集諦不生者其人於其處道諦不生耶若道生之時其人於其處集諦雖不生而其人於其處道諦非不生凡心滅時或渴愛不相應道不相應之心生時或入於滅盡定或無想有情者其人於其處集諦不生而道諦亦不生或又若某人於某處道諦不生者其人於其處集諦不生耶若渴愛生時其人於其處道諦雖不生而其人於其處集諦非不生凡心滅或道不相應渴愛不相應之心生時或入於滅盡定或無想有情者其人於其處道諦不生而集諦亦不生八四九若某人苦諦生者其人之集諦生耶然或又若某人集諦生者其人之苦諦生耶然八五若某人之苦諦生者其人道諦已生耶若未現觀者其人苦諦雖生而其人道諦非生若已現觀者其人苦諦生而道諦亦生或又若某人道諦乃至然八五一若某人集諦已生者其人道諦生耶若未現觀者其人之集諦雖已生而其人道諦非生若已現觀者其人集諦已生而道諦亦生或又若某人道諦乃至然八五二若於某處苦諦已生者乃至若於某處云云一切皆同文之異同同於前述之若於某處云云八五三若某人於某處苦諦已生者其人於其處集諦生耶若淨居天而第二心轉時或無想有情者其人於其處苦諦雖已生而其人於其處集諦非生其餘之四蘊有情五蘊有情者其人於其處苦諦已生而集諦亦生或又若某人於某處集諦乃至然八五四若某人於其處苦諦已生者其人於其處道諦生耶若於淨居天而第二心轉時或未現觀者無想有情者其人於其處苦諦