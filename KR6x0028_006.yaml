body:
  text: 第六品行雙論第一施設分一二三三行者是身行語行心行入出息者是身行尋伺者是語行想受者是心行除尋伺之外一切之心想應法是心行總説分一二四身是身行耶身行是身耶語是語行耶語行是語耶心是心行耶心行是心耶一二五非身是非身行耶非身行是非身耶非語是非語行耶非語行是非語耶非心是非心行耶非心行是非心耶一二六身是身行耶行是語行耶身是身行耶行是心行耶語是語行耶行是身行耶語是語行耶行是心行耶心是心行耶行是身行耶心是心行耶行是語行耶一二七非身是非身行耶非行是非語行耶非身是非身行耶非行是非心行耶非語是非語行耶非行是非身行耶非語是非語行耶非行是非心行耶非心是非心行耶非行是非身行耶非心是非心行耶非行是非語行耶一二八身行是語行耶語行是身行耶身行是心行耶心行是身行耶語行是心行耶心行是語行耶一二九非身行是非語行耶非語行是非身行耶非身行是非心行耶非心行是非身行耶非語行是非心行耶非心行是非語行耶義釋分一三身是身行耶不然身行是身耶不然語是語行耶不然語行是語耶不然心是心行耶不然心行是心耶不然一三一非身是非身行耶身行雖非是身但是身行除身與身行之外其餘者是非身非身行非身行是非身耶身雖是非身行但是身除身與身行之外其餘是非身非身行非語是非語行耶語行雖是非語但是語行除語與語行之外其餘是非語非語行非語行是非語耶語雖是非語行但是語除語與語行之外其餘是非語非語行非心是非心行耶心行雖是非心但是心行除心與心行之外其餘是非心非心行非心行是非心耶心雖是非心行但是心除心與心行之外其餘是非心非心行一三二身是身行耶不然行是語行耶語行是行而且是語行其餘之行雖是行但是非語行身是身行耶不然行是心行耶心行是行而且是心行其餘之行雖是行但是非心行語是語行耶不然行是身行耶身行是行而且是身行其餘之行雖是行但是非身行語是語行耶不然行是心行耶心行是行而且是心行其餘之行雖是行但是非心行心是心行耶不然行是身行耶身行是行而且是身行其餘之行雖是行但是非身行心是心行耶不然行是語行耶語行是行而且是語行其餘之行雖是行但是非語行一三三非身是非身行耶身行雖是非身但是身行除身與身行之外其餘是非身非身行非行是非語行耶然非身是非身行耶身行雖是非身但是身行除身與身行之外其餘是非身非身行非行是非心行耶然非語是非語行耶語行雖是非語但是語行除語與語行之外其餘是非語非語行非行是非身行耶然非語是非語行耶語行雖是非語但是語行除語與語行之外其餘是非語非語行非行是非心行耶然非心是非心行耶心行雖是非心但是心行除心與心行之外其餘是非心非心行非行是非身行耶然非心是非心行耶心行雖是非心但是心行除心與心行之外其餘是非心非心行非行是非語行耶然一三四身行是語行耶不然語行是身行耶不然身行是心行耶不然心行是身行耶不然語行是心行耶不然心行是語行耶不然一三五非身行是非語行耶語行雖是非身行但是語行除身行與語行之外其餘是非身行非語行非語行是非身行耶身行雖是非語行但是身行除語行與身行之外其餘是非語行非身行非身行是非心行耶心行雖是非身行但是心行除身行與心行之外其餘是非身行非心行非心行是非身行耶身行雖是非心行但是身行除心行與身行之外其餘是非心行非身行非語行是非心行耶心行雖是非語行但是心行除語行與心行之外其餘是非語行非心行非心行是非語行耶語行雖是非心行但是語行除心行與語行之外其餘是非心行非語行第二轉分生分一三六若某人身行生者於其人語行生耶無尋伺而入出息生時其人身行雖生而其人語行非生入於初靜慮者欲纏有情而入出息生時其人身行生而語行亦生或又若某人語行生者其人身行生耶無入出息而尋伺生時其人語行生而其人身行非生若入於初靜慮欲纏有情而入出息生時其人語行生而身行亦生一三七若某人身行生者其人心行生耶然或又若某人心行生者其人之身行生耶無入出息而心生時其人心行生而其人身行非生入出息生時其人心行生而身行亦生一三八若某人語行生者其人心行生耶然或又若某人心行生者其人語行生耶無尋伺而心生時其人心行生而其人語行非生尋伺生時其人心行生而語行亦生一三九若於某處身行生者於其處語行生耶於第二靜慮第三靜慮者於其處身行生而於其處語行非生於初靜慮欲纏者於其處身行生而語行亦生或又若於某處語行生者於其處身行生耶於色纏無色纏者於其處語行生而於其處身行非生於初靜慮欲纏者於其處語行生而身行亦生一四若於某處身行生者於其處心行生耶然或又若於某處心行生者於其處身行生耶於第四靜慮色纏無色纏者於其處心行生而於其處身行非生於初靜慮第二靜慮第三靜慮欲纏者於其處心行生而身行亦生一四一若於某處語行生者於其處心行生耶然或又若於某處心行生者於其處語行生耶於第二靜慮第三靜慮第四靜慮者於其處心行生而於其處語行非生於初靜慮欲纏色纏無色纏者於其處心行生而語行亦生一四二若某人於某處身行生者乃至若某人云云者與若某人於某處云云者皆同一四三若某人身行不生者其人語行不生耶無入出息而尋伺生時其人身行不生而其人語行非不生凡心滅時無入出息而無尋無伺心生時入於滅盡定者無想有情者其人身